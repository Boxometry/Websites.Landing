<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxometry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Nexa Bold';
            src: local('Nexa Bold'), local('Nexa-Bold'), url('Nexa Bold.otf');
            font-weight: bold;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d0e12; /* Slightly brighter than pure black */
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            pointer-events: none;
        }
        .logo-container {
            width: 240px; /* Increased size for the wide logo format */
            height: auto;
            margin-bottom: 1.5rem;
            animation: fadeIn 1.5s ease-out;
        }
        .url-text {
            font-family: 'Nexa Bold', 'Inter', -apple-system, sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 0.15em;
            text-transform: lowercase;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0, 85, 255, 0.3); /* Subtle glow to match brighter wave */
            animation: fadeInDelayed 2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDelayed {
            0% { opacity: 0; }
            50% { opacity: 0; }
            100% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="content">
        <div class="logo-container">
            <img src="assets/boxometry-logo-full-wob.svg" alt="Boxometry Logo" class="w-full h-auto">
        </div>
        <!-- <div class="url-text">boxometry.tech</div> -->
    </div>

    <script>
        let scene, camera, renderer, particles, count = 0;
        const SEPARATION = 40, AMOUNTX = 100, AMOUNTY = 100;

        function init() {
            const container = document.getElementById('canvas-container');

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 1000;
            camera.position.y = 500;
            camera.lookAt(new THREE.Vector3(0, 0, 0));

            scene = new THREE.Scene();
            
            // Adding fog to match the background color (#0d0e12)
            // Near: 200, Far: 2500 - this makes the distant dots fade away
            scene.fog = new THREE.Fog(0x0d0e12, 200, 2500);

            const numParticles = AMOUNTX * AMOUNTY;
            const positions = new Float32Array(numParticles * 3);
            const scales = new Float32Array(numParticles);

            let i = 0, j = 0;
            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    positions[i] = ix * SEPARATION - ((AMOUNTX * SEPARATION) / 2); // x
                    positions[i + 1] = 0; // y
                    positions[i + 2] = iy * SEPARATION - ((AMOUNTY * SEPARATION) / 2); // z
                    scales[j] = 1;
                    i += 3;
                    j++;
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));

            const material = new THREE.PointsMaterial({
                color: 0x3388FF, // Brighter, more vibrant blue
                size: 3.0,       // Slightly larger particles for better visibility
                transparent: true,
                opacity: 0.8,    // Increased opacity
                fog: true        // Explicitly ensuring fog is enabled on the material
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize, false);
            
            // Add subtle mouse interaction
            document.addEventListener('mousemove', onMouseMove, false);
        }

        let mouseX = 0, mouseY = 0;
        function onMouseMove(event) {
            mouseX = (event.clientX - window.innerWidth / 2) * 0.1;
            mouseY = (event.clientY - window.innerHeight / 2) * 0.1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        function render() {
            const positions = particles.geometry.attributes.position.array;
            let i = 0;

            for (let ix = 0; ix < AMOUNTX; ix++) {
                for (let iy = 0; iy < AMOUNTY; iy++) {
                    // Use layered trig functions with different frequencies and phases
                    // to simulate the complexity of Perlin noise
                    const xFactor = ix * 0.15;
                    const yFactor = iy * 0.15;
                    const time = count * 0.5;

                    const h = (Math.sin(xFactor + time) * 30) +
                              (Math.sin(yFactor + time * 1.2) * 30) +
                              (Math.sin((xFactor + yFactor) * 0.5 + time * 0.8) * 25) +
                              (Math.sin(Math.sqrt(xFactor * xFactor + yFactor * yFactor) * 0.2 + time) * 15);

                    positions[i + 1] = h;
                    i += 3;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY + 450 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
            count += 0.03; // Slightly slower speed for a more majestic feel
        }

        window.onload = function() {
            init();
            animate();
        };
    </script>
</body>
</html>
